<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Brain - Manuscript</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #A57982;
        }

        .logo h1 {
            color: #590004;
            font-size: 28px;
        }

        .nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav a {
            text-decoration: none;
            padding: 10px 20px;
            background-color: #A57982;
            color: white;
            border-radius: 8px;
        }

        .nav a:hover {
            background-color: #B98EA7;
        }

        .btn-primary {
            background-color: #590004;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-secondary {
            background-color: #A57982;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .project-selector {
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
        }

        .editor-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        #manuscriptContent {
            width: 100%;
            min-height: 500px;
            padding: 20px;
            font-size: 16px;
            line-height: 1.6;
            font-family: 'Georgia', serif;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
        }

        .editor-toolbar {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border-radius: 6px;
            display: none;
        }

        select, input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>✍️ Story Brain</h1>
                <p>Manuscript Editor</p>
            </div>
            <button onclick="saveManuscript()" class="btn-primary">💾 Save</button>
        </div>

        <div class="nav">
            <a href="index.html">📊 Dashboard</a>
            <a href="manuscript.html">✍️ Manuscript</a>
            <a href="characters.html">👥 Characters</a>
            <a href="world.html">🌍 World</a>
            <a href="archive.html">📦 Archive</a>
            <a href="trash.html">🗑️ Trash</a>
        </div>

        <div class="project-selector">
            <label>Select Project: </label>
            <select id="projectSelect" onchange="loadManuscript()">
                <option value="">-- Select a project --</option>
            </select>
        </div>

        <div class="editor-container">
            <div class="editor-toolbar">
                <button onclick="formatText('bold')" class="btn-secondary">B</button>
                <button onclick="formatText('italic')" class="btn-secondary">I</button>
                <button onclick="formatText('underline')" class="btn-secondary">U</button>
            </div>
            <textarea id="manuscriptContent" placeholder="Start writing your story here..."></textarea>
        </div>
    </div>

    <div id="status" class="status"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
