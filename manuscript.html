<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Story Brain — Smart Manuscript Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <!-- Quill.js for rich text editor (optional, but adds formatting) -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    .font-headline { font-family: 'Epilogue', sans-serif; }
    body { background-color: #FDF9F4; }
    .ql-container { font-size: 18px; font-family: 'Inter', serif; min-height: 500px; }
    .ql-editor { line-height: 1.8; }
    @media (max-width: 768px) {
      .sidebar-mobile { transform: translateX(-100%); transition: transform 0.3s; }
      .sidebar-mobile.open { transform: translateX(0); }
    }
  </style>
</head>
<body class="bg-[#FDF9F4] text-gray-800">

<div class="flex min-h-screen">
  <!-- Sidebar (same as before) -->
  <aside class="fixed left-0 top-0 h-full w-64 bg-white/90 backdrop-blur-sm border-r border-[#E5D5E8] shadow-sm z-50 flex flex-col p-5">
    <!-- sidebar content same as dashboard -->
    <div class="mb-8 px-2">
      <h1 class="text-2xl font-headline font-extrabold tracking-tight bg-gradient-to-r from-[#A57982] to-[#590004] bg-clip-text text-transparent">Story Brain</h1>
      <p class="text-xs text-gray-500 mt-1">creative workspace</p>
    </div>
    <nav class="flex-1 space-y-1.5">
      <a href="index.html" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-[#F3E9F5] transition"><span class="material-symbols-outlined text-[22px]">dashboard</span>Dashboard</a>
      <a href="manuscript.html" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium bg-primary/10 text-primary shadow-sm"><span class="material-symbols-outlined text-[22px]">menu_book</span>Manuscript</a>
      <a href="characters.html" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-[#F3E9F5] transition"><span class="material-symbols-outlined text-[22px]">group</span>Characters</a>
      <a href="world.html" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-[#F3E9F5] transition"><span class="material-symbols-outlined text-[22px]">public</span>World-building</a>
      <div class="pt-4 mt-2 border-t border-[#EADDF0]"></div>
      <a href="archive.html" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-gray-500 hover:bg-[#F3E9F5] transition"><span class="material-symbols-outlined text-[22px]">archive</span>Archive</a>
      <a href="trash.html" class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-gray-500 hover:bg-[#F3E9F5] transition"><span class="material-symbols-outlined text-[22px]">delete</span>Trash</a>
      <button id="exportBtnSidebar" class="mt-6 w-full bg-primary/20 text-primary font-semibold py-2.5 rounded-xl text-sm hover:bg-primary hover:text-white transition flex items-center justify-center gap-2"><span class="material-symbols-outlined text-[20px]">download</span>Export</button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="ml-64 flex-1 flex flex-col min-h-0">
    <!-- Top Bar with Smart Tools -->
    <div class="sticky top-0 z-40 bg-[#FDF9F4]/80 backdrop-blur-md border-b border-[#EADDF0] px-4 md:px-8 py-3 flex flex-wrap justify-between items-center gap-2">
      <div class="flex items-center gap-2 flex-wrap">
        <h2 class="text-xl md:text-2xl font-headline font-bold text-[#2C1E2A]">Manuscript Editor</h2>
        <div class="flex gap-1">
          <button id="autoSaveToggle" class="p-2 rounded-lg hover:bg-gray-100 text-xs" title="Auto-save on/off">
            <span class="material-symbols-outlined text-[18px]">autorenew</span>
          </button>
          <button id="wordCountGoalBtn" class="p-2 rounded-lg hover:bg-gray-100 text-xs" title="Set daily goal">
            <span class="material-symbols-outlined text-[18px]">target</span>
          </button>
          <button id="revisionHistoryBtn" class="p-2 rounded-lg hover:bg-gray-100 text-xs" title="Revision history">
            <span class="material-symbols-outlined text-[18px]">history</span>
          </button>
        </div>
      </div>
      <div class="flex items-center gap-2 flex-wrap">
        <span class="text-sm text-gray-500"><span id="wordCountDisplay">0</span> words</span>
        <span class="text-sm text-gray-500">|</span>
        <span class="text-sm text-gray-500" id="dailyGoalDisplay">Daily: 0/500</span>
        <span class="text-sm text-gray-500">|</span>
        <span class="text-sm text-gray-500" id="readabilityScore">Readability: --</span>
      </div>
    </div>

    <!-- Editor Area -->
    <div class="flex-1 overflow-y-auto p-4 md:p-8">
      <div class="max-w-4xl mx-auto bg-white rounded-2xl border border-[#EADDF0] shadow-sm">
        <div id="editor" class="min-h-[600px] p-6 md:p-10"></div>
      </div>
    </div>

    <!-- Floating Smart Assistant -->
    <div class="fixed bottom-4 right-4 z-50">
      <button id="smartAssistantBtn" class="bg-primary text-white p-3 rounded-full shadow-lg hover:shadow-xl transition-all">
        <span class="material-symbols-outlined">magic</span>
      </button>
    </div>

    <!-- Revision History Modal -->
    <div id="revisionModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
      <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[80vh] overflow-auto m-4 p-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-headline font-bold">Revision History</h3>
          <button onclick="document.getElementById('revisionModal').classList.add('hidden')" class="text-gray-500">&times;</button>
        </div>
        <div id="revisionList" class="space-y-2"></div>
      </div>
    </div>

    <!-- Daily Goal Modal -->
    <div id="goalModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
      <div class="bg-white rounded-2xl max-w-md w-full m-4 p-6">
        <h3 class="text-xl font-headline font-bold mb-4">Set Daily Word Goal</h3>
        <input type="number" id="dailyGoalInput" class="w-full border border-gray-200 rounded-xl p-3 mb-4" placeholder="Words per day" value="500">
        <div class="flex gap-3">
          <button id="saveGoalBtn" class="flex-1 bg-primary text-white py-2 rounded-xl">Save</button>
          <button onclick="document.getElementById('goalModal').classList.add('hidden')" class="flex-1 border py-2 rounded-xl">Cancel</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="app.js"></script>
<script>
  // Smart Editor Features
  let quill;
  let currentProject = null;
  let autoSaveEnabled = true;
  let revisionHistory = [];
  let dailyGoal = 500;
  let todayWords = 0;

  function initEditor() {
    quill = new Quill('#editor', {
      theme: 'snow',
      placeholder: 'Start writing your story...\n\nType @ to mention a character...',
      modules: {
        toolbar: [
          ['bold', 'italic', 'underline', 'strike'],
          ['blockquote', 'code-block'],
          [{ 'header': 1 }, { 'header': 2 }],
          [{ 'list': 'ordered'}, { 'list': 'bullet' }],
          [{ 'script': 'sub'}, { 'script': 'super' }],
          [{ 'indent': '-1'}, { 'indent': '+1' }],
          [{ 'direction': 'rtl' }],
          [{ 'size': ['small', false, 'large', 'huge'] }],
          [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
          [{ 'color': [] }, { 'background': [] }],
          [{ 'font': [] }],
          [{ 'align': [] }],
          ['clean']
        ],
        mention: {
          allowedChars: /^[A-Za-z\sÅÄÖåäö]*$/,
          mentionDenotationChars: ['@'],
          source: function(searchTerm, renderList) {
            const characters = state.characters || [];
            const matches = characters.filter(c => 
              c.name.toLowerCase().includes(searchTerm.toLowerCase())
            );
            renderList(matches, searchTerm);
          },
          renderItem: function(item) {
            return `${item.name} — ${item.role || 'Character'}`;
          }
        }
      }
    });

    quill.on('text-change', () => {
      const text = quill.getText();
      const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
      document.getElementById('wordCountDisplay').innerText = words;
      
      // Update daily progress
      if (currentProject) {
        updateDailyProgress(words);
      }
      
      if (autoSaveEnabled) {
        debounceAutoSave();
      }
    });

    // Load project content
    loadProjectContent();
  }

  let autoSaveTimeout;
  function debounceAutoSave() {
    clearTimeout(autoSaveTimeout);
    autoSaveTimeout = setTimeout(() => {
      saveManuscript();
    }, 1500);
  }

  function saveManuscript() {
    if (!currentProject) return;
    const content = quill.root.innerHTML;
    const text = quill.getText();
    const wordCount = text.trim().split(/\s+/).filter(w => w.length > 0).length;
    
    // Save to revision history
    revisionHistory.push({
      timestamp: new Date().toISOString(),
      content: content,
      wordCount: wordCount,
      preview: text.substring(0, 100)
    });
    if (revisionHistory.length > 50) revisionHistory.shift();
    localStorage.setItem(`revisions_${currentProject.id}`, JSON.stringify(revisionHistory));
    
    // Update project
    currentProject.manuscriptContent = content;
    currentProject.wordCount = wordCount;
    currentProject.lastEdited = new Date().toISOString();
    saveState();
    
    document.getElementById('lastSavedTime').innerText = new Date().toLocaleTimeString();
  }

  function loadProjectContent() {
    currentProject = getCurrentProject();
    if (currentProject && quill) {
      quill.root.innerHTML = currentProject.manuscriptContent || '';
      const words = (currentProject.manuscriptContent || '').replace(/<[^>]*>/g, '').trim().split(/\s+/).filter(w => w.length > 0).length;
      document.getElementById('wordCountDisplay').innerText = words;
      
      // Load revision history
      const savedRevisions = localStorage.getItem(`revisions_${currentProject.id}`);
      if (savedRevisions) revisionHistory = JSON.parse(savedRevisions);
    }
  }

  function updateDailyProgress(currentWords) {
    const today = new Date().toDateString();
    const dailyStats = JSON.parse(localStorage.getItem('dailyStats') || '{}');
    todayWords = dailyStats[today] || 0;
    
    if (currentWords > todayWords) {
      dailyStats[today] = currentWords;
      localStorage.setItem('dailyStats', JSON.stringify(dailyStats));
      todayWords = currentWords;
    }
    
    const remaining = Math.max(0, dailyGoal - todayWords);
    document.getElementById('dailyGoalDisplay').innerHTML = `Daily: ${todayWords}/${dailyGoal}`;
    
    if (todayWords >= dailyGoal && dailyGoal > 0) {
      showNotification('🎉 Congratulations! You\'ve reached your daily word goal!', 'success');
    }
    
    // Update readability score
    updateReadabilityScore(currentWords);
  }

  function updateReadabilityScore(wordCount) {
    const text = quill.getText();
    const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0).length;
    const wordsPerSentence = sentences > 0 ? wordCount / sentences : 0;
    
    let score = 'Excellent';
    if (wordsPerSentence > 20) score = 'Complex';
    else if (wordsPerSentence > 15) score = 'Good';
    else if (wordsPerSentence > 10) score = 'Fair';
    else if (wordsPerSentence > 0) score = 'Easy';
    
    document.getElementById('readabilityScore').innerHTML = `Readability: ${score}`;
  }

  function showNotification(message, type = 'info') {
    const notif = document.createElement('div');
    notif.className = `fixed bottom-20 right-4 p-4 rounded-xl shadow-lg z-50 animate-slide-in ${type === 'success' ? 'bg-green-500 text-white' : 'bg-primary text-white'}`;
    notif.innerHTML = message;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
  }

  // Auto-save toggle
  document.getElementById('autoSaveToggle')?.addEventListener('click', () => {
    autoSaveEnabled = !autoSaveEnabled;
    showNotification(`Auto-save ${autoSaveEnabled ? 'enabled' : 'disabled'}`, 'info');
  });

  // Revision history
  document.getElementById('revisionHistoryBtn')?.addEventListener('click', () => {
    const container = document.getElementById('revisionList');
    if (revisionHistory.length === 0) {
      container.innerHTML = '<div class="text-gray-500 text-center py-8">No revisions yet. Keep writing!</div>';
    } else {
      container.innerHTML = revisionHistory.slice().reverse().map(rev => `
        <div class="border rounded-xl p-3 hover:bg-gray-50 cursor-pointer" onclick="restoreRevision('${rev.timestamp}')">
          <div class="flex justify-between items-start">
            <div>
              <span class="text-xs text-gray-500">${new Date(rev.timestamp).toLocaleString()}</span>
              <div class="text-sm font-medium">${rev.wordCount} words</div>
              <div class="text-xs text-gray-600 mt-1 italic">${rev.preview.substring(0, 80)}...</div>
            </div>
            <button class="text-primary text-xs">Restore</button>
          </div>
        </div>
      `).join('');
    }
    document.getElementById('revisionModal').classList.remove('hidden');
  });

  window.restoreRevision = (timestamp) => {
    const revision = revisionHistory.find(r => r.timestamp === timestamp);
    if (revision && confirm('Restore this version? Current content will be saved in history.')) {
      quill.root.innerHTML = revision.content;
      saveManuscript();
      document.getElementById('revisionModal').classList.add('hidden');
      showNotification('Revision restored!', 'success');
    }
  };

  // Daily goal
  document.getElementById('wordCountGoalBtn')?.addEventListener('click', () => {
    document.getElementById('dailyGoalInput').value = dailyGoal;
    document.getElementById('goalModal').classList.remove('hidden');
  });
  
  document.getElementById('saveGoalBtn')?.addEventListener('click', () => {
    dailyGoal = parseInt(document.getElementById('dailyGoalInput').value) || 500;
    localStorage.setItem('dailyGoal', dailyGoal);
    document.getElementById('goalModal').classList.add('hidden');
    showNotification(`Daily goal set to ${dailyGoal} words`, 'success');
  });

  // Smart Assistant (AI-ready)
  document.getElementById('smartAssistantBtn')?.addEventListener('click', () => {
    const selection = quill.getSelection();
    const selectedText = selection ? quill.getText(selection.index, selection.length) : '';
    
    const suggestions = [
      "✨ Consider adding sensory details to make the scene immersive.",
      "📖 The protagonist's motivation could be stronger here.",
      "💡 This would be a great place for a plot twist!",
      "🔍 Show, don't tell - use action to reveal character emotions."
    ];
    
    const randomSuggestion = suggestions[Math.floor(Math.random() * suggestions.length)];
    showNotification(randomSuggestion, 'info');
  });

  // Initialize
  loadState();
  initEditor();
  
  // Load daily goal
  const savedGoal = localStorage.getItem('dailyGoal');
  if (savedGoal) dailyGoal = parseInt(savedGoal);
  
  // Export
  document.getElementById('exportBtnSidebar')?.addEventListener('click', () => {
    const exportData = {
      projects: state.projects,
      characters: state.characters,
      plotThreads: state.plotThreads,
      worldData: state.worldData,
      currentManuscript: quill?.root.innerHTML
    };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `storybrain_export_${new Date().toISOString().slice(0,19)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });
</script>
</body>
</html>
